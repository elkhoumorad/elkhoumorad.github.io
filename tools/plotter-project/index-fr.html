    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traceur Dimensionnel | The Time Reversal</title>

    <!-- External Scientific Libraries -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <a href="/index.html" class="back-link">← Retour au Laboratoire Time Reversal</a>
        <span class="logo-text">Traceur Dimensionnel</span>
    </nav>
<link rel="icon" type="image/png" href="/favicon.png">
    <div class="app-container">
        <!-- Ergonomic Control Sidebar -->
        <aside class="sidebar">
            <div class="control-group">
                <label for="dimSelect">Espace Dimensionnel</label>
                <select id="dimSelect">
                    <option value="1">Graphique 1D : f(x)</option>
                    <option value="2" selected>Graphique de Surface 2D : f(x,y)</option>
                    <option value="3">Isosurface 3D : f(x,y,z)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="funcInput">Fonction</label>
                <input type="text" id="funcInput" value="sin(sqrt(x^2 + y^2))">
                <small class="hint">Utilisez x, y, z. Exemple : exp(-x^2)</small>
            </div>

            <div class="control-group interval-group">
                <div class="axis-bounds">
                    <label>X Min / Max</label>
                    <div class="flex-row">
                        <input type="number" id="xMin" value="-10">
                        <input type="number" id="xMax" value="10">
                    </div>
                </div>

                <div class="axis-bounds" id="yBounds">
                    <label>Y Min / Max</label>
                    <div class="flex-row">
                        <input type="number" id="yMin" value="-10">
                        <input type="number" id="yMax" value="10">
                    </div>
                </div>

                <div class="axis-bounds" id="zBounds" style="display: none;">
                    <label>Z Min / Max</label>
                    <div class="flex-row">
                        <input type="number" id="zMin" value="-10">
                        <input type="number" id="zMax" value="10">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label for="stepsInput">Résolution (Pas)</label>
                <input type="number" id="stepsInput" value="40" min="10" max="500">
                <small class="hint">Pas plus élevés = courbe plus lisse, mais rendu plus lent.</small>
            </div>

            <button id="plotBtn" class="primary-btn">Générer le Graphique</button>
            <div id="errorMsg" class="error-text"></div>
        </aside>

        <!-- Main Plotting Canvas -->
        <main class="plot-area">
            <div id="plotContainer"></div>
        </main>
    </div>

    <script src="plot.js"></script>

  <footer>
        <p>&copy; 2026 The Time Reversal. Développé par Morad.</p>
    </footer>


  
</body>
</html>
