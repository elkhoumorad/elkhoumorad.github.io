<nav style="padding: 20px;">
    <a href="../index.html" style="text-decoration: none; color: #007bff; font-weight: bold;">

    <header>
        <h1>Symmetry Inspector</h1>
        <p>Irreducible Representation Calculator</p>
    </header>

    <div class="content">
        <label><strong>Choose a Point Group:</strong></label>
        
        <select id="group-select" onchange="updateUI()">
    <optgroup label="Nonaxial groups">
        <option value="C1">C1</option>
        <option value="Cs">Cs</option>
        <option value="Ci">Ci</option>
    </optgroup>
    <optgroup label="Cn groups">
        <option value="C2">C2</option>
        <option value="C3">C3</option>
        <option value="C4">C4</option>
        <option value="C5">C5</option>
        <option value="C6">C6</option>
        <!-- Add C4-C8 as you go -->
    </optgroup>
    <optgroup label="Cnv groups">
        <option value="C2v">C2v</option>
        <option value="C3v">C3v</option>
        <option value="C4v">C4v</option>
        <option value="C5v">C5v</option>
        <option value="C6v">C6v</option>
    </optgroup>
    <optgroup label="Cnh Groups">
    <option value="C2h">C2h</option>
    <option value="C3h">C3h</option>
    <option value="C4h">C4h</option>
    <option value="C5h">C5h</option>
    <option value="C6h">C6h</option>
    </optgroup>
    <optgroup label="Dnh groups">
        <option value="D2h">D2h</option>
        <option value="D3h">D3h</option>
        <option value="D4h">D4h</option>
        <option value="D5h">D5h</option>
        <option value="D6h">D6h</option>
    </optgroup>
    <optgroup label="Dnd Groups">
    <option value="D2d">D2d</option>
    <option value="D3d">D3d</option>
    <option value="D4d">D4d</option>
    <option value="D5d">D5d</option>
    <option value="D6d">D6d</option>
    </optgroup>
    <optgroup label="Sn Groups">
    <option value="S4">S4</option>
    <option value="S6">S6</option>
    <option value="S8">S8</option>
    </optgroup>
    <optgroup label="Cubic groups">
        <option value="Td">Td</option>
        <option value="Oh">Oh</option>
        <option value="T">T</option>
        <option value="Th">Th</option>
        <option value="O">O</option>
        <option value="I">I</option>
        <option value="Ih">Ih</option>
    </optgroup>
</select>

        <!-- The Javascript will inject the table here -->
        <div id="table-container"></div>

        <div id="input-section">
            <p>Enter the characters for &Gamma; for each class:</p>
            <!-- The Javascript will inject the input boxes here -->
            <div id="dynamic-inputs"></div>
            <button onclick="runCalculation()">Calculate</button>
            <button onclick="resetCalculator()" class="reset-btn">Reset</button>
        </div>

        <div id="result-display">
            <h3>Result:</h3>
            <p id="output"></p> 
        </div>
    </div>

    <footer>
        <p>&copy; 2026 The Time Reversal. Built by M.E.K.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    
    <!-- 4. Load KaTeX Auto-Render -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/auto-render.min.js"></script>

    <!-- 5. Load your Brain (script.js) -->
    
    <script src="script.js"></script>
    <!-- 6. The "Handshake" Script -->
    <script>
        // Wait until everything above is fully loaded and painted
        window.addEventListener('DOMContentLoaded', () => {
            // Trigger the table build
            if (typeof updateUI === 'function') {
                updateUI();
            }
        });
    </script>
</body>
</html>
